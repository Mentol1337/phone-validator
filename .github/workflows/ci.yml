name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Black check
        run: black --check .

      - name: Flake8 check
        run: flake8 .

      - name: Tests
        run: pytest

      - name: Doctest
        run: python -m doctest -v validator.py

      - name: Security
        run: bandit -r . -x ./venv || true

        # - name: Security
#   run: bandit -r . -x ./venv